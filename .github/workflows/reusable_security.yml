name: Reusable Security

# --------------------------------------------------------------------------
# This workflow is only run when explicitly called by another workflow.
# --------------------------------------------------------------------------
on:
  workflow_call:

# This workflow is passive so ensure the minimal permissions even if the
# inherited token is more lenient.
permissions:
  contents: read
  issues: none
  pull-requests: none
  id-token: none
  security-events: none

jobs:
  scorecard:
    name: OpenSSF Scorecards
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Needed to upload the results to code-scanning dashboard.
      id-token: write         # Needed to access GitHub's OIDC token which verifies the authenticity of the result when publishing it.

    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results-${{ github.workflow_sha }}-${{ github.run_number }}.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Scorecard SARIF file
          path: scorecard-results-${{ github.workflow_sha }}-${{ github.run_number }}.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: scorecard-results-${{ github.workflow_sha }}-${{ github.run_number }}.sarif
