# Reusable Vulnerabilities Scan Workflow
# ======================================
# - OSV-Scanner: Google's Open Source Vulnerabilities database for dependency CVEs
# - Trivy Source: Filesystem scan for secrets and misconfig (vuln handled by OSV)
#
# Container image scanning is handled separately by reusable_trivy_image_scan.yml
# to avoid forcing elevated permissions (packages: write, id-token: write) on
# callers that only need source/dependency scanning.

name: Reusable Vulnerabilities Scan

on:
  workflow_call:
    inputs:
      enable_osv:
        description: 'Enable OSV dependency scanning'
        type: boolean
        default: true
      enable_trivy_source:
        description: 'Enable Trivy source scan (secrets + misconfig)'
        type: boolean
        default: false
      trivy_severity:
        description: 'Severity levels to report'
        type: string
        default: 'HIGH,CRITICAL'
      trivy_ignorefile:
        description: 'Path to .trivyignore or .trivyignore.yaml for scoped exclusions'
        type: string
        default: ''

permissions:
  contents: none
  security-events: none
  actions: none

concurrency:
  group: vuln-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call_ext_osv_scanner:
    name: OSV-Scanner
    if: ${{ inputs.enable_osv }}
    # https://google.github.io/osv-scanner/github-action/
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      fail-on-vuln: true
      upload-sarif: true
      results-file-name: osv-scanner-pr-results-${{ github.workflow_sha }}-${{ github.run_number }}.sarif

  trivy_source:
    name: Trivy Source Scan
    if: ${{ inputs.enable_trivy_source }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy source scanner
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          version: 'v0.70.0'
          scan-type: 'fs'
          scanners: 'secret,misconfig'
          severity: ${{ inputs.trivy_severity }}
          trivyignores: ${{ inputs.trivy_ignorefile }}
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-source-scan-${{ github.workflow_sha }}-${{ github.run_number }}.sarif'
          # NOTE: exit-code 0 because trivy-action's exit-code behavior is inconsistent
          # with SARIF format. We parse SARIF to check for actual findings instead.
          exit-code: '0'

      - name: Upload SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: 'trivy-source-scan-${{ github.workflow_sha }}-${{ github.run_number }}.sarif'
          category: 'trivy-source'

      - name: Publish findings to summary
        if: ${{ steps.trivy.outcome == 'success' }}
        env:
          SARIF_FILE: trivy-source-scan-${{ github.workflow_sha }}-${{ github.run_number }}.sarif
          REPO: ${{ github.repository }}
        run: |
          jq -r --arg repo "$REPO" '
            [.runs[] | (.results // [])[] | select(.level == "error")] |
            if length == 0 then
              "### Trivy Source Scan -- No Findings\n\nNo HIGH/CRITICAL findings detected.\n"
            else
              "### Trivy Source Scan -- \(length) Finding(s)\n\n" +
              "| # | Rule ID | File | Line | Description |\n" +
              "|---|---------|------|------|-------------|\n" +
              (to_entries | map(
                .value as $f |
                (($f.locations // [])[0] // {} | .physicalLocation // {}) as $loc |
                ($loc.artifactLocation.uri // "N/A") as $file |
                ($loc.region.startLine // "-") as $line |
                ($f.message.text // ""
                  | gsub("\n"; " ") | gsub("\\|"; "&#124;")
                  | if length > 100 then .[0:100] + "..." else . end
                ) as $desc |
                "| \(.key + 1) | `\($f.ruleId // "unknown")` | `\($file)` | \($line) | \($desc) |"
              ) | join("\n")) +
              "\n\n> Full SARIF details in [Code Scanning alerts](https://github.com/" + $repo + "/security/code-scanning).\n"
            end
          ' "$SARIF_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on findings
        if: ${{ steps.trivy.outcome == 'success' }}
        env:
          SARIF_FILE: trivy-source-scan-${{ github.workflow_sha }}-${{ github.run_number }}.sarif
        run: |
          COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$SARIF_FILE")
          [ "$COUNT" -eq 0 ] || { echo "::error::Found $COUNT HIGH/CRITICAL findings"; exit 1; }
