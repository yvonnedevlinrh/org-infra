---
name: Reusable GitHub Branch Protection Scan

# --------------------------------------------------------------------------
# This workflow builds complyctl from source and uses it to scan GitHub
# branch protection rules via the ampel-branch-protection policy.
# Policy bundles are fetched directly from Quay.io (public OCI artifacts).
# The compliance verdict is based on the Gemara evaluation log (provider-
# agnostic), not the scan exit code (which signals operational issues only).
# --------------------------------------------------------------------------
on:
  workflow_call:
    inputs:
      complytime_config_path:
        description: 'Relative path of the complytime configuration file in the calling repository'
        required: false
        type: string
        default: '.complytime/complytime.yaml'
      policy_id:
        description: 'Policy ID to use for complyctl generate and scan commands'
        required: false
        type: string
        default: 'ampel-bp'
    secrets:
      source_token:
        description: 'GitHub token used by snappy to read branch protection rules via the GitHub API'
        required: true

permissions:
  id-token: none
  attestations: none
  contents: none

jobs:
  github-branch-protection-scan:
    name: GitHub Branch Protection Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout complyctl source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: complytime/complyctl
          ref: v1.0.0-beta.0
          persist-credentials: false

      - name: Checkout complytime-providers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: complytime/complytime-providers
          ref: v0.1.0
          path: _providers
          persist-credentials: false

      - name: Checkout calling repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: _caller
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: './go.mod'

      - name: Build complyctl
        run: |
          make build

      - name: Build ampel provider
        working-directory: _providers
        run: |
          make build-ampel-provider

      - name: Install snappy
        uses: carabiner-dev/actions/install/snappy@94f29392187fe5082d1195a7d4cae3a7ddf09d9c

      - name: Install ampel
        uses: carabiner-dev/actions/install/ampel@94f29392187fe5082d1195a7d4cae3a7ddf09d9c

      - name: Register ampel provider with complyctl
        run: |
          mkdir -p ~/.complytime/providers
          cp _providers/bin/complyctl-provider-ampel ~/.complytime/providers/complyctl-provider-ampel

      - name: Validate complytime_config_path input
        env:
          CONFIG_PATH: ${{ inputs.complytime_config_path }}
        run: |
          if [[ ! "${CONFIG_PATH}" =~ ^[a-zA-Z0-9_./-]+$ ]] || [[ "${CONFIG_PATH}" == *".."* ]]; then
            echo "::error::Invalid complytime_config_path"
            exit 1
          fi
          echo "CONFIG_PATH=${CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Copy workspace configuration
        run: |
          mkdir -p .complytime
          cp "_caller/${CONFIG_PATH}" .complytime/complytime.yaml

      - name: Fetch policy bundle from OCI registry
        run: ./bin/complyctl get

      - name: Validate policy_id input
        env:
          POLICY_ID: ${{ inputs.policy_id }}
        run: |
          if [[ ! "${POLICY_ID}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid policy_id '${POLICY_ID}': must match ^[a-zA-Z0-9_-]+$"
            exit 1
          fi
          echo "POLICY_ID=${POLICY_ID}" >> "$GITHUB_ENV"

      - name: Generate policy graph
        run: |
          ./bin/complyctl generate --policy-id "${POLICY_ID}"

      - name: Scan branch protection rules
        id: scan
        env:
          GITHUB_TOKEN: "${{ secrets.source_token }}"
        run: |
          set +e
          ./bin/complyctl scan --policy-id "${POLICY_ID}" --format pretty
          scan_exit=$?
          echo "exit_code=${scan_exit}" >> "$GITHUB_OUTPUT"
          if [ "${scan_exit}" -ne 0 ]; then
            echo "::warning::Scan reported operational issues (exit code ${scan_exit})"
          fi
          exit 0

      - name: Install YAML parser
        if: always()
        run: pip install --quiet pyyaml

      - name: Publish report to GitHub Step Summary
        if: always()
        run: |
          python3 << 'PYEOF' >> "$GITHUB_STEP_SUMMARY"
          import glob
          import yaml

          STATUS = {"Passed": "✅", "Failed": "❌", "NotApplicable": "⚠️"}

          logs = sorted(glob.glob(".complytime/scan/evaluation-log-*.yaml"))
          if not logs:
              print("*No Gemara evaluation logs found.*")
              raise SystemExit(0)

          for log_file in logs:
              with open(log_file) as f:
                  data = yaml.safe_load(f)

              target = data.get("target", {}).get("name", "unknown")
              result = data.get("result", "Unknown")
              icon = STATUS.get(result, "❓")

              print(f"## Compliance Scan: {target}")
              print()
              print(f"**Result:** {icon} {result}")
              print()

              evals = data.get("evaluations", [])
              if not evals:
                  print("No controls evaluated.")
                  print()
                  continue

              counts = {}
              for ev in evals:
                  r = ev.get("result", "Unknown")
                  counts[r] = counts.get(r, 0) + 1

              parts = []
              for label in ["Passed", "Failed", "NotApplicable"]:
                  if counts.get(label, 0) > 0:
                      parts.append(f"{counts[label]} {label.lower()}")
              print(f"**Controls:** {', '.join(parts)}")
              print()

              failed = [e for e in evals if e.get("result") != "Passed"]
              if failed:
                  print("| Control | Status | Message |")
                  print("|---------|--------|---------|")
                  for ev in failed:
                      name = ev.get("name", "")
                      r = ev.get("result", "Unknown")
                      msg = ev.get("message", "")
                      print(f"| {name} | {STATUS.get(r, '❓')} {r} | {msg} |")
                  print()

              print("> Full details in the `gemara-evaluation-log` artifact.")
              print()
          PYEOF

      - name: Evaluate compliance results
        id: compliance
        if: always()
        run: |
          python3 << 'PYEOF'
          import glob
          import os
          import yaml

          output_file = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          logs = sorted(glob.glob(".complytime/scan/evaluation-log-*.yaml"))

          if not logs:
              print("No Gemara evaluation logs found")
              with open(output_file, "a") as out:
                  out.write("compliance_result=none\n")
              raise SystemExit(0)

          compliance_result = "pass"
          for log_file in logs:
              with open(log_file) as f:
                  data = yaml.safe_load(f)
              result = data.get("result", "Unknown")
              target = data.get("target", {}).get("name", "unknown")
              print(f"Gemara result for {target}: {result}")
              if result == "Failed":
                  compliance_result = "fail"

          with open(output_file, "a") as out:
              out.write(f"compliance_result={compliance_result}\n")
          PYEOF

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-policies-ampel-branch-protection.md
          path: report-*.md
          if-no-files-found: warn

      - name: Upload Ampel Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ampel.intoto.json
          path: .complytime/ampel/results/*-ampel.intoto.json
          if-no-files-found: warn

      - name: Upload Snappy Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snappy.intoto.json
          path: .complytime/ampel/results/*-snappy.intoto.json
          if-no-files-found: warn

      - name: Upload Gemara Evaluation Log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gemara-evaluation-log
          path: .complytime/scan/evaluation-log-*.yaml
          if-no-files-found: warn

      - name: Compliance scan verdict
        if: always()
        env:
          COMPLIANCE_RESULT: ${{ steps.compliance.outputs.compliance_result }}
          SCAN_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
        run: |
          if [ "${SCAN_EXIT_CODE:-0}" != "0" ]; then
            echo "::warning::Scan reported operational issues (exit code ${SCAN_EXIT_CODE})"
          fi
          case "${COMPLIANCE_RESULT}" in
            fail)
              echo "::error::Compliance checks failed — review the Gemara evaluation log"
              exit 1
              ;;
            none)
              echo "::error::No compliance results found — scan may have failed"
              exit 1
              ;;
            pass)
              echo "Compliance checks passed"
              exit 0
              ;;
            *)
              echo "::warning::Unexpected compliance result: ${COMPLIANCE_RESULT}"
              exit 1
              ;;
          esac
