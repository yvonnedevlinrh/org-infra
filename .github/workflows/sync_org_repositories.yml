---
# Workflow: Sync Organization Repositories
#
# Synchronizes standard files, workflows, and Dependabot configuration
# from org-infra to all repositories in the organization.
# Uses direct push with a GitHub App token to create PRs.

name: Sync Organization Repositories

# Only allow manual trigger.
on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'Specific repositories to sync (space-separated, leave empty for all)'
        required: false
        type: string
      dry_run:
        description: 'Dry run mode (no changes will be made)'
        required: false
        type: boolean
        default: false

# Minimal permissions for the workflow GITHUB_TOKEN.
# The GitHub App token (generated below) carries its own permissions
# (contents:write, pull_requests:write) scoped to target repos.
# Note: the sync script also clones the org's .github repository
# (for peribolos.yaml) using the App token, not this GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  sync-repositories:
    name: Sync Repositories
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout org-infra Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SYNC_APP_CLIENT_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "complytime-repo-sync[bot]"
          git config --global user.email "complytime-repo-sync[bot]@users.noreply.github.com"

      - name: Run sync script (all repos)
        if: github.event.inputs.repos == ''
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=(--org "${{ github.repository_owner }}" --config sync-config.yml)
          if [ "$DRY_RUN" == "true" ]; then
            ARGS+=(--dry-run)
          fi
          python scripts/sync-org-repositories.py "${ARGS[@]}"

      - name: Run sync script (specific repos)
        if: github.event.inputs.repos != ''
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          REPOS: ${{ github.event.inputs.repos }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=(--org "${{ github.repository_owner }}" --config sync-config.yml --repos "$REPOS")
          if [ "$DRY_RUN" == "true" ]; then
            ARGS+=(--dry-run)
          fi
          python scripts/sync-org-repositories.py "${ARGS[@]}"

      - name: Summary
        if: always()
        env:
          REPOS: ${{ github.event.inputs.repos }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          {
            echo "## Sync Organization Repositories Complete"
            echo "- **Organization:** ${{ github.repository_owner }}"
            echo "- **Trigger:** ${{ github.event_name }}"

            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              echo "- **Dry Run:** $DRY_RUN"
              if [ -n "$REPOS" ]; then
                echo "- **Repositories:** $REPOS"
              else
                echo "- **Repositories:** All (from peribolos.yml)"
              fi
            fi
            echo ""
            echo "### Workflow Details"
            echo "- Uses direct push to create sync branches in target repos"
            echo "- PRs created from sync branch to main (requires review)"
          } >> "$GITHUB_STEP_SUMMARY"
