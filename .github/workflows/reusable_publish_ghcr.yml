# Reusable Push Image Workflow
# ============================
# Builds and optionally pushes container images with supply chain security artifacts.
# Focused responsibility: build + push only.
#
# Modes:
# - push=true (default): Full pipeline — build, push, attestations
# - push=false: Build-only — validates Dockerfile and action versions without
#   requiring GHCR write access or org membership. Useful for dependabot PRs.
#
# Security Layers (for unprotected refs, push=true only):
# - Layer 1: Workflow opt-in via allow_unprotected_ref input (default: false)
# - Layer 2: Org membership verification via GitHub API
# - Layer 3: Tag isolation (dev-sha-* and dev-* tags for unprotected refs)
#
# Tag Formats:
# - Protected refs:   sha-<commit>, <branch> (e.g., sha-abc123, main)
# - Unprotected refs: dev-sha-<commit>, dev-<branch> (e.g., dev-sha-abc123, dev-feat-xyz)
#
# Attestations (SLSA provenance + SBOM):
# - generate_attestations='auto' (default): only for protected refs
# - generate_attestations='true': always generate (even for unprotected refs)
# - Skipped entirely when push=false
#
# Required Permissions by Mode:
# - push=true:  contents:read, packages:write, id-token:write, actions:read, attestations:write
# - push=false: contents:read, actions:read (write perms are no-op but caller must still grant them)
#
# Org Membership Check (unprotected refs only):
# - Public orgs: GITHUB_TOKEN works (has public membership read access)
# - Private orgs: Provide org_check_token secret with PAT (org:read scope)

name: Reusable Push Image

on:
  workflow_call:
    inputs:
      component_name:
        description: "Component name (e.g., compass, beacon-distro)"
        required: true
        type: string
      containerfile_path:
        description: "Containerfile path relative to repo root"
        required: true
        type: string
      context_path:
        description: "Build context path"
        required: true
        type: string
      image_name:
        description: "Image name without registry (e.g., org/image-name)"
        required: true
        type: string
      image_description:
        description: "Image description for OCI label (defaults to component_name)"
        required: false
        type: string
      image_vendor:
        description: "Vendor name for OCI label"
        required: false
        type: string
      force_rebuild:
        description: "Force rebuild without cache"
        required: false
        default: false
        type: boolean
      platforms:
        description: "Comma-separated target platforms"
        required: false
        default: "linux/amd64"
        type: string
      allow_unprotected_ref:
        description: "Allow builds from unprotected refs (PR branches). Default: false (protected refs only)"
        required: false
        default: false
        type: boolean
      generate_attestations:
        description: "Generate SLSA provenance and SBOM. Values: auto (based on ref_protected), true (always). Default: auto"
        required: false
        default: "auto"
        type: string
      push:
        description: "Push image to GHCR. Set to false for build-only CI validation without registry access."
        required: false
        default: true
        type: boolean
    secrets:
      org_check_token:
        description: "PAT with org:read scope for private org membership checks. Falls back to GITHUB_TOKEN if not provided."
        required: false
    outputs:
      digest:
        description: "Pushed image digest (empty when push=false)"
        value: ${{ jobs.push.outputs.digest }}
      image:
        description: "Full image name (ghcr.io/org/image)"
        value: ${{ jobs.push.outputs.image }}
      image_ref:
        description: "Full image reference with tag (empty when push=false)"
        value: ${{ jobs.push.outputs.image_ref }}
      tags:
        description: "Multi-line string with all applied tags (empty when push=false)"
        value: ${{ jobs.push.outputs.tags }}

permissions:
  contents: none
  packages: none
  id-token: none
  attestations: none
  actions: none

concurrency:
  group: reusable-push-${{ inputs.image_name }}-${{ github.ref }}
  cancel-in-progress: ${{ !github.ref_protected }}

jobs:
  push:
    if: ${{ github.ref_protected || inputs.allow_unprotected_ref }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # Checkout source code
      packages: write # Push to GHCR (and write cache)
      actions: read # Required for GHA cache access (Buildx layer caching)
      id-token: write # Required for GitHub attestations (OIDC token)
      attestations: write # Required for pushing attestations to GHCR
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      image: ${{ steps.images.outputs.image }}
      image_ref: ${{ steps.output_refs.outputs.image_ref }}
      tags: ${{ steps.output_refs.outputs.tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /usr/local/share/boost \
                      /usr/local/.ghcup \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Verify org membership
        if: ${{ inputs.push && !github.ref_protected && inputs.allow_unprotected_ref }}
        env:
          GH_TOKEN: ${{ secrets.org_check_token != '' && secrets.org_check_token || secrets.GITHUB_TOKEN }}
          ORG_CHECK_TOKEN_PROVIDED: ${{ secrets.org_check_token != '' }}
          ACTOR: ${{ github.actor }}
          ORG: ${{ github.repository_owner }}
        run: |
          echo "::notice::Checking if $ACTOR is a member of $ORG"

          # Call GitHub API to check org membership
          # -L follows 302 redirect to public_members endpoint when
          # GITHUB_TOKEN lacks org-level read permission (expected for public orgs)
          HTTP_STATUS=$(curl -s -L -o /tmp/org_check_response.json -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/$ORG/members/$ACTOR")

          case $HTTP_STATUS in
            204)
              echo "::notice::✓ $ACTOR is a member of $ORG"
              ;;
            404)
              echo "::error::✗ $ACTOR is NOT a member of $ORG"
              echo "::error::Only organization members can push images from unprotected refs"
              exit 1
              ;;
            401|403)
              echo "::error::Authentication failed (HTTP $HTTP_STATUS)"
              if [[ "$ORG_CHECK_TOKEN_PROVIDED" != "true" ]]; then
                echo "::error::For private orgs, provide a PAT with 'org:read' scope via org_check_token secret"
              fi
              echo "::error::Response: $(cat /tmp/org_check_response.json)"
              exit 1
              ;;
            *)
              echo "::error::GitHub API request failed (HTTP $HTTP_STATUS)"
              echo "::error::Response: $(cat /tmp/org_check_response.json)"
              exit 1
              ;;
          esac

      - name: Determine tag prefix
        env:
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          if [[ "$REF_PROTECTED" == "true" ]]; then
            echo "TAG_PREFIX=" >> "$GITHUB_ENV"
            echo "::notice::Protected ref detected - using production tags (sha-*, branch)"
          else
            echo "TAG_PREFIX=dev-" >> "$GITHUB_ENV"
            echo "::notice::Unprotected ref detected - using dev tags (dev-sha-*, dev-branch)"
          fi

      - name: Resolve attestation policy
        id: attestation_policy
        env:
          INPUT_GENERATE_ATTESTATIONS: ${{ inputs.generate_attestations }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          case "$INPUT_GENERATE_ATTESTATIONS" in
            auto)
              ENABLED="$REF_PROTECTED"
              echo "::notice::Attestation policy: auto (ref_protected=$ENABLED)"
              ;;
            true)
              ENABLED="true"
              echo "::notice::Attestation policy: true (forced on)"
              ;;
            *)
              echo "::error::Invalid generate_attestations value: $INPUT_GENERATE_ATTESTATIONS"
              echo "::error::Must be 'auto' or 'true'"
              exit 1
              ;;
          esac
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Container Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set image reference
        id: images
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
        run: echo "image=ghcr.io/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.images.outputs.image }}
          tags: |
            type=sha,format=long,prefix=${{ env.TAG_PREFIX }}sha-,priority=1000
            type=ref,event=branch,prefix=${{ env.TAG_PREFIX }}
            type=ref,event=pr,prefix=${{ env.TAG_PREFIX }}
            type=ref,event=tag,prefix=${{ env.TAG_PREFIX }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=${{ inputs.component_name }}
            org.opencontainers.image.description=${{ inputs.image_description || inputs.component_name }}
            ${{ inputs.image_vendor && format('org.opencontainers.image.vendor={0}', inputs.image_vendor) || '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.containerfile_path }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ inputs.component_name }}-${{ github.ref_name }}
            type=gha,scope=${{ inputs.component_name }}-main
          cache-to: type=gha,mode=max,scope=${{ inputs.component_name }}-${{ github.ref_name }}
          sbom: false
          provenance: false
          no-cache: ${{ inputs.force_rebuild }}

      - name: Export digest
        if: ${{ inputs.push }}
        id: digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "digest=${BUILD_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest SLSA provenance
        if: ${{ inputs.push && steps.attestation_policy.outputs.enabled == 'true' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.images.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: ${{ inputs.push && steps.attestation_policy.outputs.enabled == 'true' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.images.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        if: ${{ inputs.push && steps.attestation_policy.outputs.enabled == 'true' }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.images.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Set output references
        if: ${{ inputs.push }}
        id: output_refs
        env:
          IMAGE: ${{ steps.images.outputs.image }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Extract primary tag (first line of metadata-action output)
          # tags output contains full refs (ghcr.io/org/image:tag), strip to bare tag
          PRIMARY_REF=$(echo "$TAGS" | head -n1)
          PRIMARY_TAG="${PRIMARY_REF##*:}"

          # Set outputs using grouped redirects
          {
            echo "image_ref=${IMAGE}:${PRIMARY_TAG}"
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Image reference: ${IMAGE}:${PRIMARY_TAG}"
          echo "::notice::All tags: $(echo "$TAGS" | tr '\n' ' ')"
