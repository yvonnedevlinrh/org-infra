# SPDX-License-Identifier: Apache-2.0
# Reusable GoReleaser Release Workflow
# =====================================
# Runs GoReleaser with enforced supply chain security (cosign signing, syft SBOMs).
# Go version is always read from go.mod. Action versions are centralized here.
#
# Usage:
#   release:
#     needs: preflight
#     uses: complytime/org-infra/.github/workflows/reusable_release_goreleaser.yml@v1
#     with:
#       tag: ${{ needs.preflight.outputs.tag }}

name: Reusable GoReleaser Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'The release tag (e.g., v1.2.3). Must exist as a git tag.'
        required: true
        type: string
      goreleaser_version:
        description: 'GoReleaser version constraint'
        required: false
        type: string
        default: '~> v2'
      goreleaser_args:
        description: 'GoReleaser command-line arguments'
        required: false
        type: string
        default: 'release --clean --verbose'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install cosign for signatures
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft for SBOMs
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: ${{ inputs.goreleaser_version }}
          args: ${{ inputs.goreleaser_args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
