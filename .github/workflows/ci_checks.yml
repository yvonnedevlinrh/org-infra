name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  call_reusable_ci:
    name: Standardized CI
    uses: ./.github/workflows/reusable_ci.yml
    permissions:
      contents: read
      issues: read
      pull-requests: read
