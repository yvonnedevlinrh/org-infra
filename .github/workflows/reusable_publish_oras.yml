# Reusable Publish OCI Artifact (ORAS) Workflow
# ==============================================
# Pushes arbitrary files as OCI artifacts to GHCR via ORAS CLI with supply-chain security parity
# to reusable_publish_ghcr.yml: SLSA provenance + SPDX SBOM attestation.
# No Containerfile or Docker build required — designed for data-only artifacts (YAML, JSON, etc.).
#
# Downstream note: reusable_sign_and_verify.yml requires the vuln attestation by default.
# Callers publishing ORAS artifacts must set verify_vuln: false.

name: Reusable Publish OCI Artifact (ORAS)

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name without registry (e.g., org/image-name)'
        required: true
        type: string
      artifact_type:
        description: 'OCI artifactType annotation (e.g., application/vnd.complytime.gemara.policies.v1)'
        required: true
        type: string
      paths:
        description: |
          Newline-separated list of path:mediatype pairs to push.
          Use the exact Gemara layer media types from complyctl/internal/complytime/consts.go:
            bundles/nist-catalog.yaml:application/vnd.gemara.catalog.v1+yaml
            bundles/nist-policy.yaml:application/vnd.gemara.policy.v1+yaml
            guidance/nist.yaml:application/vnd.gemara.guidance.v1+yaml
        required: true
        type: string
      image_description:
        description: 'OCI org.opencontainers.image.description annotation (defaults to image_name)'
        required: false
        type: string
      sbom_scan_path:
        description: 'Local path to scan for SBOM generation (defaults to repo root)'
        required: false
        default: '.'
        type: string
    outputs:
      digest:
        description: 'Pushed artifact digest (sha256:...)'
        value: ${{ jobs.publish.outputs.digest }}
      image:
        description: 'Full image reference (ghcr.io/org/image-name)'
        value: ${{ jobs.publish.outputs.image }}
      sha_tag:
        description: 'Tag used for the push (sha-<40-char-commit-sha>)'
        value: ${{ jobs.publish.outputs.sha_tag }}

permissions:
  contents: none
  packages: none
  id-token: none
  attestations: none
  actions: none

concurrency:
  group: reusable-oras-${{ inputs.image_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: ${{ github.ref_protected }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read       # Checkout source for SBOM scan
      packages: write      # Push artifact and attestations to GHCR
      id-token: write      # OIDC token for GitHub attestations
      attestations: write  # Write attestations to GHCR
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      image: ${{ steps.image_ref.outputs.image }}
      sha_tag: ${{ steps.image_ref.outputs.sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.0

      - name: Set image reference
        id: image_ref
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "image=ghcr.io/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Push OCI artifact
        id: push
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          ARTIFACT_TYPE: ${{ inputs.artifact_type }}
          IMAGE_DESCRIPTION: ${{ inputs.image_description || inputs.image_name }}
          PATHS_INPUT: ${{ inputs.paths }}
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          PUSH_ARGS=()
          while IFS= read -r line; do
            [[ -n "$line" ]] && PUSH_ARGS+=("$line")
          done <<< "$PATHS_INPUT"

          oras push "ghcr.io/${IMAGE_NAME}:sha-${COMMIT_SHA}" \
            --artifact-type "${ARTIFACT_TYPE}" \
            --annotation "org.opencontainers.image.source=${SOURCE_URL}" \
            --annotation "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --annotation "org.opencontainers.image.description=${IMAGE_DESCRIPTION}" \
            "${PUSH_ARGS[@]}"

      - name: Fetch digest
        id: digest
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DIGEST=$(oras manifest fetch "ghcr.io/${IMAGE_NAME}:sha-${COMMIT_SHA}" \
            --descriptor | jq -r '.digest')
          if ! echo "$DIGEST" | grep -qE '^sha256:[a-f0-9]{64}$'; then
            echo "::error::Unexpected digest format: '${DIGEST}'"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest SLSA provenance
        if: ${{ github.ref_protected }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image_ref.outputs.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        if: ${{ github.ref_protected }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ inputs.sbom_scan_path }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        if: ${{ github.ref_protected }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.image_ref.outputs.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
