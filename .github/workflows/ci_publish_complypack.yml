# Publish Complypack — Ampel Branch Protection
# ==============================================
# Dual-registry publish pipeline for the Ampel branch-protection complypack.
#
# Push to main / workflow_dispatch:
#   1. publish-ghcr — packs and pushes the complypack OCI artifact to GHCR (sha-<commit> tag)
#   2. sign-ghcr    — signs the GHCR artifact with Sigstore keyless signing
#
# Release (published):
#   3. verify-ghcr-source — verifies the GHCR artifact exists for the tagged commit
#   4. promote-quay       — promotes the verified artifact from GHCR to Quay.io

name: Publish Complypack (Ampel Branch Protection)

on:
  push:
    branches:
      - main
    paths:
      - 'compliance/ampel/branch-protection/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Custom tag (leave empty for default sha-<commit>)'
        required: false
        type: string

permissions:
  contents: none
  packages: none
  id-token: none
  attestations: none
  actions: none

concurrency:
  group: ci-complypack-ampel-bp-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  publish-ghcr:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable_publish_complypack.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      content_path: compliance/ampel/branch-protection
      image_name: complytime/complypack-ampel-branch-protection
      tag: ${{ inputs.tag_override || format('sha-{0}', github.sha) }}
      evaluator_id: ampel
      complypack_id: io.complytime.ampel-branch-protection
      complypack_version: 0.1.0-dev
      go_version: '1.26.4'
      tag_latest: true

  sign-ghcr:
    needs: [publish-ghcr]
    if: >-
      always()
      && needs.publish-ghcr.result == 'success'
      && needs.publish-ghcr.outputs.image != ''
      && needs.publish-ghcr.outputs.digest != ''
    uses: ./.github/workflows/reusable_sign_and_verify.yml
    permissions:
      packages: write
      id-token: write
    with:
      image_name: ${{ needs.publish-ghcr.outputs.image }}
      digest: ${{ needs.publish-ghcr.outputs.digest }}
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      verify_vuln: false

  verify-ghcr-source:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: read
    steps:
      - name: Setup crane
        uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6

      - name: Check GHCR artifact exists
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TAG: sha-${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          IMAGE="ghcr.io/complytime/complypack-ampel-branch-protection:${SOURCE_TAG}"
          echo "$TOKEN" | crane auth login ghcr.io -u "$GH_ACTOR" --password-stdin

          if crane manifest "$IMAGE" > /dev/null 2>&1; then
            echo "Image found: $IMAGE"
          else
            echo "::error::No GHCR image found for tag '${SOURCE_TAG}'."
            echo ""
            echo "The Quay promotion requires a signed image on GHCR, which is built"
            echo "by the publish workflow on pushes to main."
            echo ""
            echo "To fix this:"
            echo "  1. Check the publish workflows for the tagged commit:"
            echo "     ${REPO_URL}/actions/workflows/ci_publish_complypack.yml"
            echo "  2. If the publish failed or was skipped, fix the issue and"
            echo "     re-run the publish workflow via workflow_dispatch."
            echo "  3. Once the GHCR image exists, re-run this workflow."
            exit 1
          fi

  promote-quay:
    needs: [verify-ghcr-source]
    if: >-
      always()
      && needs.verify-ghcr-source.result == 'success'
    uses: ./.github/workflows/reusable_publish_quay.yml
    permissions:
      packages: read
    with:
      source_registry: ghcr.io
      source_image: complytime/complypack-ampel-branch-protection
      source_tag: ${{ format('sha-{0}', github.sha) }}
      dest_registry: quay.io
      dest_image: complytime/complypack-ampel-branch-protection
      dest_tag: ${{ github.event.release.tag_name }}
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      fail_if_dest_exists: true
    secrets:
      dest_username: ${{ secrets.QUAY_USERNAME }}
      dest_password: ${{ secrets.QUAY_PASSWORD }}
