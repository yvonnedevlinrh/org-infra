# Publish Complypack — Ampel Branch Protection
# ==============================================
# Dual-registry publish pipeline for the Ampel branch-protection complypack.
#
# Push to main / workflow_dispatch (default):
#   1. publish-ghcr — packs and pushes the complypack OCI artifact to GHCR
#                     (tag_override tag, or sha-<commit> when not specified)
#   2. sign-ghcr    — signs the GHCR artifact with Sigstore keyless signing
#
# Release (published) / workflow_dispatch (promote_quay=true):
#   3. verify-ghcr-source — verifies the GHCR artifact exists on GHCR
#   4. promote-quay       — promotes the verified artifact from GHCR to Quay.io
#
# Manual Quay promotion:
#   Use workflow_dispatch with promote_quay=true and release_tag to promote an
#   existing GHCR artifact to Quay without cutting a new release.
#   When the GHCR image was published with tag_override, pass the same
#   tag_override value so the promotion finds the correct source image.
#   Otherwise, source_sha (or HEAD) is used to construct the sha-<commit> tag.
#   This is needed because release events from GITHUB_TOKEN-based workflows
#   do not trigger downstream workflows (GitHub Actions limitation).

name: Publish Complypack (Ampel Branch Protection)

on:
  push:
    branches:
      - main
    paths:
      - 'compliance/ampel/branch-protection/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Custom tag (leave empty for default sha-<commit>)'
        required: false
        type: string
      promote_quay:
        description: 'Promote existing GHCR artifact to Quay (skips GHCR publish)'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Quay destination tag (required when promote_quay is true, e.g., v0.4.0)'
        required: false
        type: string
      source_sha:
        description: 'Source commit SHA to promote (defaults to current HEAD)'
        required: false
        type: string

permissions:
  contents: none
  packages: none
  id-token: none
  attestations: none
  actions: none

concurrency:
  group: ci-complypack-ampel-bp-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  publish-ghcr:
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'workflow_dispatch' && !inputs.promote_quay)
    uses: ./.github/workflows/reusable_publish_complypack.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      content_path: compliance/ampel/branch-protection
      image_name: complytime/complypack-ampel-branch-protection
      tag: ${{ inputs.tag_override || format('sha-{0}', github.sha) }}
      evaluator_id: ampel
      complypack_id: io.complytime.ampel-branch-protection
      complypack_version: 0.1.0-dev
      go_version: '1.26.4'
      tag_latest: true

  sign-ghcr:
    needs: [publish-ghcr]
    if: >-
      always()
      && needs.publish-ghcr.result == 'success'
      && needs.publish-ghcr.outputs.image != ''
      && needs.publish-ghcr.outputs.digest != ''
    uses: ./.github/workflows/reusable_sign_and_verify.yml
    permissions:
      packages: write
      id-token: write
    with:
      image_name: ${{ needs.publish-ghcr.outputs.image }}
      digest: ${{ needs.publish-ghcr.outputs.digest }}
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      verify_vuln: false

  verify-ghcr-source:
    if: >-
      github.event_name == 'release'
      || (github.event_name == 'workflow_dispatch' && inputs.promote_quay)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: read
    steps:
      - name: Validate promotion inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "::error::release_tag is required when promote_quay is true"
            exit 1
          fi

      - name: Setup crane
        uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6

      - name: Check GHCR artifact exists
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TAG: ${{ inputs.tag_override || format('sha-{0}', inputs.source_sha || github.sha) }}
          GH_ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          IMAGE="ghcr.io/complytime/complypack-ampel-branch-protection:${SOURCE_TAG}"
          echo "$TOKEN" | crane auth login ghcr.io -u "$GH_ACTOR" --password-stdin

          if crane manifest "$IMAGE" > /dev/null 2>&1; then
            echo "Image found: $IMAGE"
          else
            echo "::error::No GHCR image found for tag '${SOURCE_TAG}'."
            echo ""
            echo "The Quay promotion requires a signed image on GHCR, which is built"
            echo "by the publish workflow on pushes to main."
            echo ""
            echo "To fix this:"
            echo "  1. Check the publish workflows for the tagged commit:"
            echo "     ${REPO_URL}/actions/workflows/ci_publish_complypack.yml"
            echo "  2. If the publish failed or was skipped, fix the issue and"
            echo "     re-run the publish workflow via workflow_dispatch."
            echo "  3. Once the GHCR image exists, re-run this workflow."
            exit 1
          fi

  promote-quay:
    needs: [verify-ghcr-source]
    if: >-
      always()
      && needs.verify-ghcr-source.result == 'success'
    uses: ./.github/workflows/reusable_publish_quay.yml
    permissions:
      packages: read
      id-token: write   # Required by reusable_publish_quay.yml for Sigstore keyless signing
    with:
      source_registry: ghcr.io
      source_image: complytime/complypack-ampel-branch-protection
      source_tag: ${{ inputs.tag_override || format('sha-{0}', inputs.source_sha || github.sha) }}
      dest_registry: quay.io
      dest_image: complytime/complypack-ampel-branch-protection
      dest_tag: ${{ github.event.release.tag_name || inputs.release_tag }}
      allowed_identity_regex: https://github.com/complytime/org-infra(/.*)?
      fail_if_dest_exists: true
      include_sha_tags: false
    secrets:
      dest_username: ${{ secrets.QUAY_USERNAME }}
      dest_password: ${{ secrets.QUAY_PASSWORD }}
