# SPDX-License-Identifier: Apache-2.0

name: Test CRAP Load Workflow

on:
  pull_request:
    paths:
      - '.github/workflows/ci_test_crapload.yml'
      - '.github/workflows/reusable_crapload_analysis.yml'
      - 'scripts/generate-crapload-comment.sh'
      - 'scripts/resolve-go-packages.sh'
      - 'tests/test_crapload_package_resolution.py'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ci_test_crapload.yml'
      - '.github/workflows/reusable_crapload_analysis.yml'
      - 'scripts/generate-crapload-comment.sh'
      - 'scripts/resolve-go-packages.sh'
      - 'tests/test_crapload_package_resolution.py'

permissions:
  contents: read

jobs:
  test-package-resolution:
    name: Test Package Resolution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 'stable'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run package resolution tests
        run: make test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-test-results
          path: |
            .pytest_cache/
          retention-days: 7
